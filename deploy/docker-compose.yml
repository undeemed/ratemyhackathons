services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ratemyhackathons
      POSTGRES_USER: rmh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rmh -d ratemyhackathons"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://rmh:${POSTGRES_PASSWORD}@postgres:5432/ratemyhackathons
      HOST: "0.0.0.0"
      PORT: "8080"
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
    ports:
      - "8080:8080"

  crawler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.crawler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://rmh:${POSTGRES_PASSWORD}@postgres:5432/ratemyhackathons
      PROXY_URL: ${PROXY_URL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    command: ["python", "main.py", "--daemon"]

  analytics:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.analytics
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://rmh:${POSTGRES_PASSWORD}@postgres:5432/ratemyhackathons
      ANALYTICS_BIND: "0.0.0.0:8081"
    ports:
      - "8081:8081"

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        PUBLIC_CLERK_PUBLISHABLE_KEY: ${PUBLIC_CLERK_PUBLISHABLE_KEY:-}
        CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      ORIGIN: http://lexies-mac-mini.tailc4c9b.ts.net:3000
      API_URL: http://backend:8080
      PUBLIC_CLERK_PUBLISHABLE_KEY: ${PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    ports:
      - "3000:3000"

volumes:
  pgdata:
